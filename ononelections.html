<!DOCTYPE html>
<head>
  <title>ononelections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

  <style>
    #map {
      width: 100%; /* 600px; */
      height: 550px;
    }
  </style>
</head>
<body class="container">
  <h1>ononelections</h1>
  <div class="row">
    <div class="col-md-7">
      <div id="map"></div>
    </div>

    <div class="col-md-5" id="reporting-summary">
    </div>
  </div>

  <script>
    const groupBy = (xs, func) => {
      return xs.reduce((acc, x) => {
        (acc[func(x)] = acc[func(x)] || []).push(x);
        return acc;
      }, {});
    };

    const sum = (obj, attr) => {
      return obj.reduce((a, b) => a + b[attr], 0);
    };

    ///// \\\\\ ///// \\\\\

    const addElectionReportingSummary = (features) => {
      let grouppedPrecincts = groupBy(features, (f) => f.properties.TOWN);
      grouppedPrecincts = Object.keys(grouppedPrecincts).map((townName) => {
        const town = {
          town: townName,
          reported: grouppedPrecincts[townName].filter(p => p.properties.reportingStatus == 2).length,
          total: grouppedPrecincts[townName].length,
        };

        town.pct = Math.round(1000 * (town.reported / town.total)) / 10;
        return town;
      });

      const grouppedPrecinctsHtml = grouppedPrecincts.map(p =>
        `<li class="list-group-item">${p.town} -- ${p.reported}/${p.total} (${p.pct}%)</li>`);

      const $html = `
        <div class="card">
          <div class="card-header">
            <b>ONONDAGA COUNTY -- ${sum(grouppedPrecincts, 'reported')}/${sum(grouppedPrecincts, 'total')} districts reporting</b>
          </div>
          <ul class="list-group list-group-flush">
            ${grouppedPrecinctsHtml.join('')}
          </ul>
        </div>
      `;

      document.getElementById('reporting-summary').innerHTML = $html;
    };

    const getMuniShapes = () => {
      const muniShapesUrl = 'https://gisservices.its.ny.gov/arcgis/rest/services/NYS_Civil_Boundaries/FeatureServer/6/query'
      return fetch(`${muniShapesUrl}?f=geojson&outFields=NAME&outSR=4326&where=${encodeURIComponent("COUNTY='Onondaga'")}`)
        .then(r => r.json())
        .then(r => r.features);
    };

    const getElectionReporting = (electionSlug) => {
      const electionReportingUrl = `https://ongov.resultscaster.com/api/Resultscasts/${electionSlug}/pdresults/Election%20Day`;
      return fetch(electionReportingUrl)
        .then(r => r.json())
        .then(r => r.pds);
    };

    const getElectionShapes = (electionSlug) => {
      const electionShapesUrl = `https://ongov.resultscaster.com/api/Resultscasts/${electionSlug}/geoshell`;
      return fetch(electionShapesUrl)
        .then(r => r.json())
        .then(r => r.pds);
    };

    const mergeElectionShapesAndReporting = ([precincts, reportingStatuses]) => {
      return Object.keys(precincts).map((precinctId) => {
        const precinctObj = precincts[precinctId][0];
        precinctObj.properties.reportingStatus = reportingStatuses.filter(p => p.key === precinctId)[0].status;
        precinctObj.type = 'Feature';
        return precinctObj;
      }).flat();
    };

    const getAndAddElectionShapes = (electionSlug) => {
      return Promise.all([
        getElectionShapes('PR26'),
        getElectionReporting('PR26')
      ])
        .then(mergeElectionShapesAndReporting)
        .then((features) => {
          const style = (f) => {
            return {
              color: f.properties.reportingStatus == 2 ? 'green' : 'purple',
              fillColor: f.properties.reportingStatus == 2 ? 'green' : 'purple',
              stroke: 0.5
            };
          };

          L.geoJSON({ type: 'FeatureCollection', features }, { style }).addTo(map);
          return Promise.resolve(features);
        })
        .then(addElectionReportingSummary);
    };

    const map = L.map('map').setView([43.02, -76.19], 10);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    getAndAddElectionShapes('PR26')
      .then(() => {
        getMuniShapes()
          .then((features) => {
            const style = {
              color: 'black',
              fill: false,
              stroke: 3
            };

            L.geoJSON({ type: 'FeatureCollection', features }, style).addTo(map);
          });
      });
  </script>
</body>
