      sumContestResultsByPrecinct([contestInfo, precincts, precinctResultsByBallotGroup]) {
        let precinctResults = Object.values(groupBy(precinctResultsByBallotGroup, (r) => r.key));
        precinctResults = precinctResults.map((precinctResult) => {
          return {
            precinctName: this.getEnhancedPrecinctName(precincts[precinctResult[0].key][0].name),
            result: precinctResult.map(cr => cr.choices).flat()
          };
        });

        let muniResults = groupBy(precinctResults, (r) => r.precinctName);
        return Promise.resolve(Object.keys(muniResults).map((muniName) => {
          const muniResult = muniResults[muniName].map(muniResult => muniResult.result);

          let candidates = this.mergeCandidates(muniResult.flat());
          // candidates = this.checkWriteInCandidates(candidates);

          candidates = candidates.map(c => this.sumCandidate(c, contestInfo));
          candidates = Object.values(groupBy(candidates, c => c.name)).map((candidateEntries) => ({
            name: candidateEntries[0].name,
            votes: candidateEntries.reduce((acc, c) => acc + c.votes, 0)
          }));

          candidates = this._calculateCandidatePercentages(candidates);

          return { name: muniName, candidates };
        }));
      }

      _calculateCandidatePercentages(candidates) {
        const totalVotes = candidates.reduce((acc, c) => acc + c.votes, 0);

        return candidates.map((c) => {
          return {...c, pct: totalVotes === 0 ? 0 : Math.round(1000 * (c.votes / totalVotes)) / 10 };
        });
      }

      return xs.reduce((acc, x) => {
        (acc[func(x)] = acc[func(x)] || []).push(x);
        return acc;
