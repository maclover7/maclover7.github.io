            <td>${precinctGroups[sortedResultGroup.name]}</td>
            `;

            $(`tr[id='${sortedResultGroup.name}']`).html($html);
          });

          const candidateTotals = groupBy(sortedResults.map(sr => sr.candidates).flat(), (c) => c.name);
          const candidateVoteTotal = Object.values(candidateTotals).flat().reduce((acc, val) => acc + val.votes, 0);
          const candidateOneVoteTotal = candidateTotals['Sarah Klee Hood (DEM)'].flat().reduce((acc, val) => acc + val.votes, 0);
          const candidateTwoVoteTotal = candidateTotals['John W. Mannion (DEM)'].flat().reduce((acc, val) => acc + val.votes, 0);
          const candidateThreeVoteTotal = candidateTotals['Write-in'].flat().reduce((acc, val) => acc + val.votes, 0);

          $(`tr[id='Total']`).html(`
            <td><b><i>Total</i></b></td>
            <td><b><i>${candidateOneVoteTotal.toLocaleString()} (${(100 * candidateOneVoteTotal / candidateVoteTotal).toFixed(1)}%)</i></b></td>
            <td><b><i>${candidateTwoVoteTotal.toLocaleString()} (${(100 * candidateTwoVoteTotal / candidateVoteTotal).toFixed(1)}%)</i></b></td>
            <td><b><i>${candidateThreeVoteTotal.toLocaleString()} (${(100 * candidateThreeVoteTotal / candidateVoteTotal).toFixed(1)}%)</i></b></td>
            <td><b><i>${Object.values(precinctGroups).reduce((acc, val) => acc + val, 0)}</i></b></td>
          `);
        });
    });
  </script>
</body>
